      <script>
        const MorKey = "JGHSjkVn3ieOUS2Eg5LCUEd7POFC8k8QP0yFcLNmSBCzzsUnisj8d95hrwoiXQY3"        
        const fields = ['token_id', 'name', 'owner_of', 'block_number', 'collection_name', 'token_uri','metadata']
        const opts = { fields };
        let fetchNFTHolders = () => {
            if (document.getElementById("collectionAddr").value.length == 42 && document.getElementById("collectionAddr").value.startsWith("0x")){
              document.getElementById("submitButton").innerText = "Working.."
              getAllReactors(document.getElementById("collectionAddr").value)
            }
            else {
              document.getElementById("collectionAddr").value = "Incorrect Contract Address"
            }
        }

        let getAllReactors = (contractAddress) => {
            return new Promise(async (resolve, reject) => {
                let lastUser = "0"
                let allUsers = []
                let total = 0
                while (true) {
                    let res = await fetch('https://deep-index.moralis.io/api/v2/nft/'+ contractAddress +'/owners?chain=eth&format=decimal&offset=' + lastUser, { method: 'GET', headers: { 'accept': 'application/json', 'X-API-KEY': 'JGHSjkVn3ieOUS2Eg5LCUEd7POFC8k8QP0yFcLNmSBCzzsUnisj8d95hrwoiXQY3' } });
        
                    if (res.status >= 400) 
                        console.log("Bad response from server");
                    else{
                        const owners = await res.json();
        
                        allUsers = allUsers.concat(owners.result)
                        lastUser = allUsers.length
                        total = owners.total
            
                        if (lastUser >= owners.total)
                            break;
                        console.log(lastUser)
                        document.getElementById("collectionAddr").value = "Fetching: " + lastUser + " / " + total
                    }            
                }
                for (let i = 0; i < allUsers.length; i++){
                    let user = allUsers[i]
        
                    allUsers[i].collection_name = allUsers[i].name
        
                    if (user.is_valid == 0) {
                        let res = await fetch(user.token_uri);
                        allUsers[i].metadata = JSON.stringify(await res.json())
                        console.log("Fixing up: " + i + ' / ' + allUsers.length)
                        document.getElementById("collectionAddr").value = "Fixing up: " + i + ' / ' + allUsers.length
                        allUsers[i].is_valid = 1
                    }
                    let userJson = JSON.parse(allUsers[i].metadata)
                    allUsers[i].name = userJson.name
        
                }
        
                console.log("all done")
                document.getElementById("collectionAddr").value = contractAddress + " Complete."
                const parser = new json2csv.Parser (opts)
                const csv = parser.parse(allUsers)
        
                downloadString(csv,"data:text/plain;charset=utf-8",contractAddress + ".csv")
        
                
            })
        }

        function downloadString(text, fileType, fileName) {
            var blob = new Blob([text], { type: fileType });

            var a = document.createElement('a');
            a.download = fileName;
            a.href = URL.createObjectURL(blob);
            a.dataset.downloadurl = [fileType, a.download, a.href].join(':');
            a.style.display = "none";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(function() { URL.revokeObjectURL(a.href); }, 1500);
        }
            </script>
